<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=390"/>
  <title>Screenshot 4 – Déverrouiller</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    body { width:390px; height:844px; background:#F0F7FF; font-family:'DM Sans',sans-serif; overflow:hidden; position:relative; }

    .status { display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; }
    .status-time { font-size:15px; font-weight:700; color:#0D2035; }
    .status-icons { font-size:12px; color:#0D2035; }

    /* Background (blurred detail screen) */
    .bg-content { padding:10px 16px; filter:blur(2px); opacity:0.4; }
    .bg-appbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .bg-title { font-family:'DM Serif Display',serif; font-size:20px; color:#0D2035; }
    .bg-hero { margin:0 4px; border-radius:18px; padding:18px; background:linear-gradient(135deg,#2E6DA4,#4A9FD4); text-align:center; }
    .bg-hero-emoji { font-size:40px; }
    .bg-hero-title { font-size:18px; font-weight:600; color:#fff; margin-top:6px; }

    /* Dim overlay */
    .overlay { position:absolute; inset:0; background:rgba(15,32,53,0.55); }

    /* Bottom sheet */
    .sheet {
      position:absolute;
      bottom:0; left:0; right:0;
      background:#fff;
      border-radius:28px 28px 0 0;
      padding:0 24px 34px;
    }

    .handle { width:40px; height:4px; background:#D6E8F5; border-radius:2px; margin:12px auto 28px; }

    .key-circle {
      width:60px; height:60px; border-radius:50%;
      background:rgba(46,109,164,0.08);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 16px;
    }
    .key-circle svg { width:28px; height:28px; stroke:#2E6DA4; fill:none; stroke-width:2; stroke-linecap:round; }

    .sheet-title { font-family:'DM Serif Display',serif; font-size:22px; color:#0D2035; text-align:center; margin-bottom:8px; }
    .sheet-sub { font-size:14px; color:#8AAABF; text-align:center; line-height:1.5; margin-bottom:28px; }

    .code-input {
      background:#F0F7FF;
      border-radius:12px;
      border:2px solid #2E6DA4;
      padding:18px;
      text-align:center;
      font-size:28px;
      font-weight:800;
      letter-spacing:10px;
      color:#2E6DA4;
      font-family:'DM Sans',sans-serif;
      margin-bottom:14px;
    }

    /* Success feedback */
    .feedback {
      display:flex; align-items:center; justify-content:center; gap:8px;
      background:rgba(46,109,164,0.08);
      border-radius:10px;
      padding:10px 16px;
      margin-bottom:24px;
    }
    .feedback svg { width:16px; height:16px; stroke:#2E6DA4; fill:none; stroke-width:2.5; stroke-linecap:round; flex-shrink:0; }
    .feedback span { font-size:13px; font-weight:500; color:#2E6DA4; }

    .unlock-btn {
      width:100%; height:52px; background:#2E6DA4; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:600; color:#fff; gap:8px;
    }
    .unlock-btn svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; }
  </style>
</head>
<body>
  <div class="status">
    <span class="status-time">9:41</span>
    <span class="status-icons">●●● WiFi 🔋</span>
  </div>

  <!-- Blurred background -->
  <div class="bg-content">
    <div class="bg-appbar">
      <div style="width:36px; height:36px; background:#fff; border-radius:10px;"></div>
      <div class="bg-title">Voyage à Lisbonne</div>
      <div style="width:36px;"></div>
    </div>
    <div class="bg-hero">
      <div class="bg-hero-emoji">🏖️</div>
      <div class="bg-hero-title">Voyage à Lisbonne</div>
    </div>
  </div>

  <div class="overlay"></div>

  <!-- Bottom sheet -->
  <div class="sheet">
    <div class="handle"></div>

    <div class="key-circle">
      <svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
    </div>

    <div class="sheet-title">Entrez votre code</div>
    <div class="sheet-sub">Chaque code débloque un élément<br/>de la surprise.</div>

    <div class="code-input">LISBONNE</div>

    <div class="feedback">
      <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
      <span>Code accepté ! Un élément a été révélé. 🎉</span>
    </div>

    <div class="unlock-btn">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
      Déverrouiller
    </div>
  </div>
</body>
</html>
