<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=414"/>
  <title>iPhone 1 – Accueil</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    body { width:414px; height:896px; background:#F0F7FF; font-family:'DM Sans',sans-serif; overflow:hidden; position:relative; }

    .status { display:flex; justify-content:space-between; align-items:center; padding:16px 26px 0; }
    .status-time { font-size:16px; font-weight:700; color:#0D2035; }
    .status-icons { font-size:13px; color:#0D2035; display:flex; align-items:center; gap:4px; }

    .appbar { padding:14px 22px 0; display:flex; justify-content:space-between; align-items:center; }
    .appbar-title { font-family:'DM Serif Display',serif; font-size:28px; color:#0D2035; }
    .appbar-btn { width:38px; height:38px; background:#fff; border-radius:11px; border:1px solid #D6E8F5; display:flex; align-items:center; justify-content:center; }
    .appbar-btn svg { width:18px; height:18px; stroke:#4A6580; fill:none; stroke-width:2; stroke-linecap:round; }

    .section { padding:20px 22px 6px; display:flex; align-items:center; gap:6px; }
    .section span { font-size:11px; font-weight:700; letter-spacing:1.2px; color:#8AAABF; text-transform:uppercase; }

    .card { margin:0 22px 12px; background:#fff; border-radius:20px; padding:18px; box-shadow:0 4px 20px rgba(26,58,92,0.10); display:flex; align-items:center; gap:14px; }
    .card-emoji { width:60px; height:60px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
    .card-body { flex:1; min-width:0; }
    .card-title { font-size:17px; font-weight:600; color:#0D2035; }
    .progress-bar { margin-top:8px; height:4px; background:#D6E8F5; border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:2px; }
    .progress-label { margin-top:4px; font-size:11px; font-weight:500; }
    .card-arrow { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    .fab-area { position:absolute; bottom:0; left:0; right:0; padding:18px 22px 38px; background:linear-gradient(to top,#F0F7FF 70%,transparent); display:flex; gap:12px; }
    .fab-outlined { flex:1; height:54px; border-radius:14px; border:1.5px solid #1A3A5C; background:#fff; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; font-weight:600; color:#1A3A5C; }
    .fab-filled { flex:1; height:54px; border-radius:14px; background:#1A3A5C; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; font-weight:600; color:#fff; }
  </style>
</head>
<body>
  <div class="status">
    <span class="status-time">9:41</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>

  <div class="appbar">
    <div class="appbar-title">Vos Surprises</div>
    <div class="appbar-btn"><svg viewBox="0 0 24 24"><path d="M1 4h22M1 12h22M1 20h22"/></svg></div>
  </div>

  <div class="section">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8AAABF" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
    <span>Mes créations</span>
  </div>

  <div class="card">
    <div class="card-emoji" style="background:#E8F3FB;border:1.5px solid #ADD8F0;">🏖️</div>
    <div class="card-body"><div class="card-title">Voyage à Lisbonne</div></div>
    <div class="card-arrow" style="background:#E8F3FB;border:1.5px solid #ADD8F0;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2E6DA4" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
  </div>

  <div class="section">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8AAABF" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
    <span>Rejointes</span>
  </div>

  <div class="card">
    <div class="card-emoji" style="background:#fdf4ff;border:1.5px solid #e9d5ff;">💍</div>
    <div class="card-body">
      <div class="card-title">Une grande nouvelle</div>
      <div class="progress-bar"><div class="progress-fill" style="width:25%;background:#a855f7;"></div></div>
      <div class="progress-label" style="color:#a855f7;">Éléments révélés 1 / 4</div>
    </div>
    <div class="card-arrow" style="background:#fdf4ff;border:1.5px solid #e9d5ff;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
  </div>

  <div class="card">
    <div class="card-emoji" style="background:#f0fdf4;border:1.5px solid #bbf7d0;">🎂</div>
    <div class="card-body">
      <div class="card-title">Anniversaire surprise</div>
      <div class="progress-bar"><div class="progress-fill" style="width:80%;background:#16a34a;"></div></div>
      <div class="progress-label" style="color:#16a34a;">Éléments révélés 4 / 5</div>
    </div>
    <div class="card-arrow" style="background:#f0fdf4;border:1.5px solid #bbf7d0;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
  </div>

  <div class="card">
    <div class="card-emoji" style="background:#fff7ed;border:1.5px solid #fed7aa;">✈️</div>
    <div class="card-body">
      <div class="card-title">Destination inconnue</div>
      <div class="progress-bar"><div class="progress-fill" style="width:0%;background:#f97316;"></div></div>
      <div class="progress-label" style="color:#f97316;">Éléments révélés 0 / 3</div>
    </div>
    <div class="card-arrow" style="background:#fff7ed;border:1.5px solid #fed7aa;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
  </div>

  <div class="fab-area">
    <div class="fab-outlined">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1A3A5C" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Rejoindre
    </div>
    <div class="fab-filled">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Créer
    </div>
  </div>
</body>
</html>
