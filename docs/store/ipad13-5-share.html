<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1032"/>
  <title>iPad 13" 5 – Partager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    body { width:1032px; height:1376px; background:#F0F7FF; font-family:'DM Sans',sans-serif; overflow:hidden; position:relative; }

    .status { display:flex; justify-content:space-between; align-items:center; padding:20px 40px 0; }
    .status-time { font-size:18px; font-weight:700; color:#0D2035; }
    .status-icons { font-size:14px; color:#0D2035; }

    /* Background */
    .bg { padding:14px 32px; filter:blur(3px); opacity:0.35; }
    .bg-appbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .bg-title { font-family:'DM Serif Display',serif; font-size:26px; color:#0D2035; }
    .bg-layout { display:flex; gap:24px; }
    .bg-sidebar { width:360px; }
    .bg-card { background:#fff; border-radius:20px; padding:16px; margin-bottom:12px; display:flex; gap:14px; align-items:center; }
    .bg-emoji { width:56px; height:56px; border-radius:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:24px; }
    .bg-lines { flex:1; }
    .bg-line { height:12px; background:#D6E8F5; border-radius:6px; margin-bottom:8px; }
    .bg-line.sm { width:60%; height:8px; }
    .bg-main { flex:1; }
    .bg-hero { border-radius:24px; padding:30px; background:linear-gradient(135deg,#2E6DA4,#4A9FD4); text-align:center; margin-bottom:16px; }
    .bg-hero-emoji { font-size:56px; }
    .bg-hero-title { font-size:22px; font-weight:600; color:#fff; margin-top:10px; }
    .bg-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .bg-el { background:#fff; border-radius:18px; height:120px; }

    /* Floating message */
    .msg {
      position:absolute; top:96px; right:40px; width:340px;
      background:#fff; border-radius:22px; padding:20px 22px;
      box-shadow:0 12px 48px rgba(0,0,0,0.2);
      z-index:5;
    }
    .msg-hdr { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .msg-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#2E6DA4,#4A9FD4); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .msg-name { font-size:14px; font-weight:700; color:#0D2035; }
    .msg-time { font-size:12px; color:#8AAABF; }
    .msg-text { font-size:14px; color:#4A6580; line-height:1.6; }
    .msg-code { display:inline-block; margin-top:10px; background:#E8F3FB; border-radius:10px; padding:8px 16px; font-size:18px; font-weight:800; color:#2E6DA4; letter-spacing:5px; }

    /* Dim */
    .overlay { position:absolute; inset:0; background:rgba(13,32,53,0.6); z-index:3; }

    /* Sheet — centré */
    .sheet {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      width:580px;
      background:#fff; border-radius:32px 32px 0 0;
      padding:0 40px 48px;
      z-index:10;
    }
    .handle { width:44px; height:5px; background:#D6E8F5; border-radius:3px; margin:16px auto 28px; }

    .sheet-emoji { font-size:48px; text-align:center; margin-bottom:12px; }
    h2 { font-family:'DM Serif Display',serif; font-size:26px; color:#0D2035; text-align:center; margin-bottom:10px; }
    .sub { font-size:14px; color:#8AAABF; text-align:center; line-height:1.6; margin-bottom:28px; }

    .code-box { background:#F0F7FF; border-radius:20px; border:1.5px solid #D6E8F5; padding:24px 36px; text-align:center; margin-bottom:28px; }
    .code-val { font-size:42px; font-weight:800; letter-spacing:12px; color:#2E6DA4; font-family:'DM Sans',sans-serif; }

    .btns { display:flex; gap:14px; }
    .btn-o { flex:1; height:58px; border-radius:16px; border:1.5px solid rgba(46,109,164,0.4); background:#fff; display:flex; align-items:center; justify-content:center; gap:10px; font-size:16px; font-weight:600; color:#2E6DA4; }
    .btn-o svg { width:18px; height:18px; stroke:#2E6DA4; fill:none; stroke-width:2; stroke-linecap:round; }
    .btn-f { flex:1; height:58px; border-radius:16px; background:#2E6DA4; display:flex; align-items:center; justify-content:center; gap:10px; font-size:16px; font-weight:600; color:#fff; }
    .btn-f svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; }
  </style>
</head>
<body>
  <div class="status"><span class="status-time">9:41</span><span class="status-icons">●●● WiFi 🔋</span></div>

  <div class="bg">
    <div class="bg-appbar">
      <div style="width:44px;height:44px;background:#fff;border-radius:13px;border:1px solid #D6E8F5;"></div>
      <div class="bg-title">Voyage à Lisbonne</div>
      <div style="width:44px;"></div>
    </div>
    <div class="bg-layout">
      <div class="bg-sidebar">
        <div class="bg-card"><div class="bg-emoji" style="background:#E8F3FB;">🏖️</div><div class="bg-lines"><div class="bg-line"></div><div class="bg-line sm"></div></div></div>
        <div class="bg-card"><div class="bg-emoji" style="background:#fdf4ff;">💍</div><div class="bg-lines"><div class="bg-line"></div><div class="bg-line sm"></div></div></div>
        <div class="bg-card"><div class="bg-emoji" style="background:#f0fdf4;">🎂</div><div class="bg-lines"><div class="bg-line"></div><div class="bg-line sm"></div></div></div>
      </div>
      <div class="bg-main">
        <div class="bg-hero"><div class="bg-hero-emoji">🏖️</div><div class="bg-hero-title">Voyage à Lisbonne</div></div>
        <div class="bg-grid"><div class="bg-el"></div><div class="bg-el"></div><div class="bg-el"></div><div class="bg-el"></div></div>
      </div>
    </div>
  </div>

  <!-- Floating message -->
  <div class="msg">
    <div class="msg-hdr">
      <div class="msg-avatar">👤</div>
      <div>
        <div class="msg-name">Aurélie</div>
        <div class="msg-time">À l'instant</div>
      </div>
    </div>
    <div class="msg-text">J'ai une surprise pour toi ! 🎁<br/>Ouvre ce lien ou entre le code :</div>
    <div class="msg-code">A7K2PX</div>
  </div>

  <div class="overlay"></div>

  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-emoji">🏖️</div>
    <h2>Partager "Voyage à Lisbonne"</h2>
    <div class="sub">Partagez ce code pour que vos proches<br/>puissent accéder à cette surprise.</div>
    <div class="code-box">
      <div class="code-val">A7K2PX</div>
    </div>
    <div class="btns">
      <div class="btn-o">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copier le lien
      </div>
      <div class="btn-f">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51L8.59 10.49"/></svg>
        Partager
      </div>
    </div>
  </div>
</body>
</html>
