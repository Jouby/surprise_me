<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=390"/>
  <title>Screenshot 5 – Partager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
    body { width:390px; height:844px; background:#F0F7FF; font-family:'DM Sans',sans-serif; overflow:hidden; position:relative; }

    .status { display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; }
    .status-time { font-size:15px; font-weight:700; color:#0D2035; }
    .status-icons { font-size:12px; color:#0D2035; }

    /* Blurred background */
    .bg-content { padding:10px 16px; filter:blur(2px); opacity:0.4; }
    .bg-hero { border-radius:18px; padding:20px; background:linear-gradient(135deg,#2E6DA4,#4A9FD4); text-align:center; margin-bottom:10px; }
    .bg-hero-emoji { font-size:40px; }
    .bg-hero-title { font-size:18px; font-weight:600; color:#fff; margin-top:6px; }
    .bg-card { background:#fff; border-radius:14px; border:1px solid #D6E8F5; padding:12px; margin-bottom:8px; display:flex; gap:10px; align-items:center; }
    .bg-dot { width:24px; height:24px; border-radius:7px; flex-shrink:0; }

    /* Dim overlay */
    .overlay { position:absolute; inset:0; background:rgba(15,32,53,0.55); }

    /* Bottom sheet */
    .sheet {
      position:absolute;
      bottom:0; left:0; right:0;
      background:#fff;
      border-radius:28px 28px 0 0;
      padding:0 24px 34px;
    }

    .handle { width:40px; height:4px; background:#D6E8F5; border-radius:2px; margin:12px auto 24px; }

    .sheet-emoji { font-size:40px; text-align:center; margin-bottom:10px; }
    .sheet-title { font-family:'DM Serif Display',serif; font-size:20px; color:#0D2035; text-align:center; margin-bottom:8px; }
    .sheet-sub { font-size:13px; color:#8AAABF; text-align:center; line-height:1.5; margin-bottom:22px; }

    .code-box {
      background:#F0F7FF;
      border-radius:16px;
      border:1.5px solid #D6E8F5;
      padding:18px 28px;
      text-align:center;
      margin-bottom:22px;
    }
    .code-text { font-size:34px; font-weight:800; letter-spacing:10px; color:#2E6DA4; font-family:'DM Sans',sans-serif; }

    .btn-row { display:flex; gap:12px; }
    .btn-outlined {
      flex:1; height:52px; border-radius:14px;
      border:1.5px solid rgba(46,109,164,0.4); background:#fff;
      display:flex; align-items:center; justify-content:center; gap:8px;
      font-size:14px; font-weight:600; color:#2E6DA4;
    }
    .btn-outlined svg { width:16px; height:16px; stroke:#2E6DA4; fill:none; stroke-width:2; stroke-linecap:round; }
    .btn-filled {
      flex:1; height:52px; border-radius:14px;
      background:#2E6DA4;
      display:flex; align-items:center; justify-content:center; gap:8px;
      font-size:14px; font-weight:600; color:#fff;
    }
    .btn-filled svg { width:16px; height:16px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; }

    /* Floating message preview */
    .message-preview {
      position:absolute;
      top:82px;
      left:20px;
      right:20px;
      background:#fff;
      border-radius:18px;
      padding:14px 16px;
      box-shadow:0 8px 32px rgba(0,0,0,0.18);
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .msg-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#2E6DA4,#4A9FD4); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .msg-body { flex:1; }
    .msg-name { font-size:12px; font-weight:700; color:#0D2035; margin-bottom:3px; }
    .msg-text { font-size:12px; color:#4A6580; line-height:1.5; }
    .msg-code { display:inline-block; margin-top:4px; background:#E8F3FB; border-radius:6px; padding:2px 8px; font-size:12px; font-weight:700; color:#2E6DA4; letter-spacing:2px; }
  </style>
</head>
<body>
  <div class="status">
    <span class="status-time">9:41</span>
    <span class="status-icons">●●● WiFi 🔋</span>
  </div>

  <!-- Blurred background -->
  <div class="bg-content">
    <div class="bg-hero">
      <div class="bg-hero-emoji">🏖️</div>
      <div class="bg-hero-title">Voyage à Lisbonne</div>
    </div>
    <div class="bg-card"><div class="bg-dot" style="background:#E8F3FB;"></div><div style="flex:1; height:10px; background:#F0F7FF; border-radius:4px;"></div></div>
    <div class="bg-card"><div class="bg-dot" style="background:#fef9c3;"></div><div style="flex:1; height:10px; background:#F0F7FF; border-radius:4px;"></div></div>
  </div>

  <!-- Floating message preview -->
  <div class="message-preview">
    <div class="msg-avatar">👤</div>
    <div class="msg-body">
      <div class="msg-name">Aurélie</div>
      <div class="msg-text">J'ai une surprise pour toi ! 🎁<br/>Entre ce code pour la découvrir :</div>
      <div class="msg-code">A7K2PX</div>
    </div>
  </div>

  <div class="overlay"></div>

  <!-- Bottom sheet -->
  <div class="sheet">
    <div class="handle"></div>

    <div class="sheet-emoji">🏖️</div>
    <div class="sheet-title">Partager "Voyage à Lisbonne"</div>
    <div class="sheet-sub">Partagez ce code pour que vos proches<br/>puissent accéder à cette surprise.</div>

    <div class="code-box">
      <div class="code-text">A7K2PX</div>
    </div>

    <div class="btn-row">
      <div class="btn-outlined">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copier
      </div>
      <div class="btn-filled">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51L8.59 10.49"/></svg>
        Partager
      </div>
    </div>
  </div>
</body>
</html>
