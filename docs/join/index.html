<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surprise Me — Ouvrir la surprise</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #F5F7FA; color: #1A1A2E;
    }
    .card {
      text-align: center; padding: 40px 32px;
      background: white; border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 360px; width: 90%;
    }
    .emoji { font-size: 56px; }
    h1 { font-size: 22px; margin: 16px 0 8px; }
    p { color: #888; font-size: 14px; line-height: 1.6; margin: 0 0 24px; }
    .code {
      display: inline-block;
      font-size: 28px; font-weight: 800; letter-spacing: 6px;
      color: #2E6DA4; background: #F0F6FF;
      padding: 14px 28px; border-radius: 14px;
      margin-bottom: 28px;
    }
    .btn {
      display: block; width: 100%; box-sizing: border-box;
      padding: 14px; border-radius: 14px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
      text-decoration: none; margin-bottom: 10px;
    }
    .btn-primary { background: #2E6DA4; color: white; }
    .btn-secondary {
      background: white; color: #2E6DA4;
      border: 1.5px solid #2E6DA4;
    }
    .hint { font-size: 12px; color: #aaa; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎁</div>
    <h1>Tu as une surprise !</h1>
    <p>Ouvre l'application Surprise Me pour la découvrir.</p>
    <div class="code" id="codeDisplay">…</div>
    <a class="btn btn-primary" id="openBtn" href="#">Ouvrir dans l'app</a>
    <p class="hint">Pas encore l'app ? Télécharge-la et entre le code manuellement.</p>
  </div>

  <script>
    // Le code est le dernier segment du path : /join/CODE
    // ou passé en query : /join?code=CODE
    function getCode() {
      // Sur GitHub Pages : /surprise_me/join/CODE → parts = ['surprise_me', 'join', 'CODE']
      const parts = window.location.pathname.split('/').filter(Boolean);
      const joinIdx = parts.indexOf('join');
      if (joinIdx !== -1 && parts[joinIdx + 1]) {
        return parts[joinIdx + 1].toUpperCase();
      }
      // Fallback query string : /join?code=CODE
      const params = new URLSearchParams(window.location.search);
      return (params.get('code') || '').toUpperCase();
    }

    const code = getCode();
    const codeDisplay = document.getElementById('codeDisplay');
    const openBtn = document.getElementById('openBtn');

    if (code) {
      codeDisplay.textContent = code;
      openBtn.href = 'surpriseme://join/' + code;
    } else {
      codeDisplay.textContent = '???';
      openBtn.style.display = 'none';
    }
  </script>
</body>
</html>
